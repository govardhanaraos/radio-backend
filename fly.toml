app = "radio-backend-1yizra"
primary_region = "fra"

[build]
  # If you have a Dockerfile, Fly will find it automatically. 
  # Otherwise, it will use a Buildpack.

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1